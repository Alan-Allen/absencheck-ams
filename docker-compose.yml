services:
  # 1. PostgreSQL 資料庫服務
  ams-db:
    image: postgres:latest
    container_name: ams-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin1234
      POSTGRES_DB: amsdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  # 2. Node.js Express 後端 API 服務
  ams-backend:
    image: node:20-alpine
    container_name: ams-node-backend
    restart: always
    working_dir: /app
    volumes:
      - ./backend:/app  # 掛載本地 backend 程式碼，方便即時修改免重新 build
    ports:
      - "8080:8080"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - ams-db

  # 3. React 前端服務
  ams-frontend:
    build: ./frontend   # 指向你目前含有 Dockerfile 的 frontend 資料夾
    container_name: ams-react-frontend
    restart: always
    ports:
      - "3000:3000"     # 將 React 對外映射至 3000 port
    depends_on:
      - ams-backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

volumes:
  pgdata: