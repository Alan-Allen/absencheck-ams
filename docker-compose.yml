services:
  # PostgreSQL 資料庫服務
  ams-db:
    image: postgres:latest
    container_name: ams-postgres
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  # Node.js Express 後端 API 服務
  ams-backend:
    image: node:20-alpine
    container_name: ams-node-backend
    restart: always
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    command: sh -c "npm install && npm run dev"
    depends_on:
      - ams-db

  # React 前端服務
  ams-frontend:
    build: ./frontend
    container_name: ams-react-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - ams-backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

volumes:
  pgdata: